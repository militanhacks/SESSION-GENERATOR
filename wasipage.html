<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title> MLTN MD </title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
      background: linear-gradient(45deg, #000000, #0d0015, #1a0033, #2d004d);
      background-size: 400% 400%;
      animation: gradientBG 15s ease infinite;
      font-family: 'Poppins', sans-serif;
      color: #ffffff;
      overflow: hidden;
      position: relative;
    }

    body::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: 
        radial-gradient(circle at 20% 30%, rgba(138, 43, 226, 0.2) 0%, transparent 40%),
        radial-gradient(circle at 80% 70%, rgba(0, 255, 200, 0.15) 0%, transparent 40%);
      filter: blur(30px);
      z-index: -1;
    }

    @keyframes gradientBG {
      0% {
        background-position: 0% 50%;
      }
      50% {
        background-position: 100% 50%;
      }
      100% {
        background-position: 0% 50%;
      }
    }

    .btn {
      --color: #8a2be2;
      --color2: #ffffff;
      width: 250px;
      padding: 1em 2em;
      background: linear-gradient(45deg, #5a0fc8, #8a2be2);
      border-radius: 25px;
      border: 2px solid var(--color);
      box-shadow: 0 0 15px rgba(138, 43, 226, 0.4);
      transition: all 0.4s ease;
      position: relative;
      overflow: hidden;
      cursor: pointer;
      z-index: 1;
      font-weight: 500;
      font-size: 16px;
      font-family: 'Poppins', sans-serif;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: var(--color2);
      margin-bottom: 20px;
      backdrop-filter: blur(5px);
    }

    .btn::after, .btn::before {
      content: '';
      display: block;
      height: 100%;
      width: 100%;
      transform: skew(90deg) translate(-50%, -50%);
      position: absolute;
      inset: 50%;
      left: 25%;
      z-index: -1;
      transition: .5s ease-out;
      background-color: var(--color);
    }

    .btn::before {
      top: -50%;
      left: -25%;
      transform: skew(90deg) rotate(180deg) translate(-50%, -50%);
      animation: buttonPulse 2s infinite;
    }

    @keyframes buttonPulse {
      0% {
        transform: skew(90deg) rotate(180deg) translate(-50%, -50%) scale(1);
        opacity: 1;
      }
      50% {
        transform: skew(90deg) rotate(180deg) translate(-50%, -50%) scale(1.1);
        opacity: 0.8;
      }
      100% {
        transform: skew(90deg) rotate(180deg) translate(-50%, -50%) scale(1);
        opacity: 1;
      }
    }

    .btn:hover::before {
      transform: skew(45deg) rotate(180deg) translate(-50%, -50%);
    }

    .btn:hover::after {
      transform: skew(45deg) translate(-50%, -50%);
    }

    .btn:hover {
      color: var(--color2);
    }

    .btn:active {
      filter: brightness(.7);
      transform: scale(.98);
    }

    .headline {
      font-size: 26px;
      font-weight: 700;
      letter-spacing: 3px;
      text-shadow: 0 0 15px #8a2be2, 0 0 30px #8a2be2;
      margin-bottom: 6px;
    }

    .tagline {
      font-size: 12px;
      letter-spacing: 3px;
      color: #b892ff;
      text-transform: uppercase;
      margin-bottom: 24px;
    }
  </style>
</head>
<body>
  <div style="text-align: center; margin-bottom: 10px;">

  </div>

  <button onclick="window.open(`https://wa.me/923192173398`)" class="btn">👑 Contact Me</button>
  <button onclick="window.open(`https://chat.whatsapp.com/L14FfkAgFCN9eXGe5Sqjqt`)" class="btn">🌑 Wa Group</button>
